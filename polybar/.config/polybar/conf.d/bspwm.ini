[module/bspwm]
type = internal/bspwm

ws-icon-0 = 1;1
ws-icon-1 = 2;2
ws-icon-2 = 3;3
ws-icon-3 = 4;4

label-focused = %{T2}%icon%
label-focused-background = ${colors.background}
label-focused-foreground = ${colors.foreground-alt}
label-focused-underline = ${colors.foreground}
label-focused-padding = 3

label-focused-empty = %{T2}%icon%
label-focused-empty-background = ${colors.background}
label-focused-empty-foreground = ${colors.foreground}
label-focused-empty-underline = ${colors.foreground}
label-focused-empty-padding = 3

label-occupied = %{T2}%icon%
label-occupied-foreground = ${colors.foreground-alt}
label-occupied-padding = 3

label-urgent = %{T2}%icon%
label-urgent-background = ${colors.alert}
label-urgent-padding = 3

label-empty = %{T2}%icon%
label-empty-foreground = ${colors.foreground}
label-empty-padding = 3
