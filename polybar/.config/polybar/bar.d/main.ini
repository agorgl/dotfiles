[bar/main]
width = 100%
height = 25
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

padding-left = 0
padding-right = 1

module-margin-left = 1
module-margin-right = 0

font-0 = misc termsynu:size=9;3
font-1 = terminus:size=8;2
font-2 = wuncon siji:size=8;3

modules-left = bspwm
modules-center = xwindow
modules-right = wlan eth cpu memory temperature battery pulseaudio date

tray-position = right
tray-padding = 0

wm-restack = bspwm
