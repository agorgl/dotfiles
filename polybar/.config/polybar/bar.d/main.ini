[bar/main]
width = 100%
height = ${env:POLYBAR_HEIGHT:25}
dpi-x = ${env:POLYBAR_DPI:96}
dpi-y = ${env:POLYBAR_DPI:96}
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 1
line-color = ${colors.foreground}

padding-left = 0
padding-right = 1

module-margin-left = 2
module-margin-right = 0

font-0 = misc termsynu:size=9;3
font-1 = terminus:size=8;2
font-2 = siji:size=8;2

modules-left = bspwm
modules-center = xwindow
modules-right = wlan eth cpu memory temperature battery pulseaudio time

tray-position = right
tray-padding = 0

wm-restack = bspwm
