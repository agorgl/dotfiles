[module/battery]
type = internal/battery
battery = BAT0
adapter = AC0
full-at = 98
time-format = %H:%M
poll-interval = 2

format-charging-prefix = "Óąļ "
format-discharging = <ramp-capacity> <label-discharging>
format-full-prefix = "ÓąĻ "

label-charging = %percentage%%/%time%
label-discharging = %percentage%%/%time%

ramp-capacity-0 = ÓČĆ
ramp-capacity-1 = ÓČé
ramp-capacity-2 = ÓČĎ
ramp-capacity-3 = ÓČď
