[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = ${env:POLYBAR_HEIGHT:25}
dpi-x = ${env:POLYBAR_DPI:96}
dpi-y = ${env:POLYBAR_DPI:96}
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.foreground}

padding-left = 0
padding-right = 1

module-margin-left = 2
module-margin-right = 0

font-0 = sfmono nerd font mono:size=8;3
font-1 = sfmono nerd font mono:size=8:weight=semibold;3
font-2 = icomoon\\-feather:size=9;4

modules-left = bspwm
modules-center = xwindow
modules-right = wlan eth cpu memory temperature battery pulseaudio time

tray-position = right
tray-padding = 0
tray-maxsize = ${env:POLYBAR_TRAY_SIZE:16}

wm-restack = bspwm
