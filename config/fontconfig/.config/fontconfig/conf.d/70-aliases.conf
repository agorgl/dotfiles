<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <alias>
    <family>Terminus</family>
    <prefer><family>xos4 Terminus</family></prefer>
    <default><family>fixed</family></default>
  </alias>

  <alias binding="same">
    <family>Segoe UI</family>
    <prefer>
      <family>Arial</family>
    </prefer>
  </alias>
</fontconfig>
