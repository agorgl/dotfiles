<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <alias>
    <family>Terminus</family>
    <accept>
      <family>Terminess Nerd Font Mono</family>
    </accept>
  </alias>

  <alias binding="same">
    <family>Segoe UI</family>
    <prefer>
      <family>Arial</family>
    </prefer>
  </alias>
</fontconfig>
